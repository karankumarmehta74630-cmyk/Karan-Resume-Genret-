<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NBHC Smart System</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.1/qrcode.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f2f2f2;}
.container{max-width:500px;margin:auto;padding:10px;}

.card{
background:#fff;padding:12px;border-radius:12px;
margin-bottom:10px;box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

input,textarea{
width:100%;padding:10px;margin:6px 0;
border-radius:8px;border:1px solid #ccc;
}

button{
width:100%;padding:10px;margin-top:6px;
border:none;border-radius:8px;
background:linear-gradient(45deg,green,#00c853);
color:#fff;
}

.preview{
background:#e6ffe6;padding:10px;border-radius:8px;
white-space:pre-line;
}

.profileBtn{background:#1976d2;}

.switch{display:flex;gap:5px;}
.switch button{flex:1;background:#333;}

#profilePanel{
position:fixed;top:0;left:-100%;
width:85%;max-width:320px;height:100%;
background:#fff;padding:15px;
transition:0.3s;z-index:999;overflow:auto;
}
#profilePanel.active{left:0;}

.historyBox{
background:#fff;padding:10px;border-radius:10px;
margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<button class="profileBtn" onclick="toggleProfile()">☰ Profile</button>

<div class="switch">
<button onclick="setMode(1)">Analyzer</button>
<button onclick="setMode(2)">Supervisor</button>
</div>

<!-- PROFILE -->
<div id="profilePanel">
<h3>Profile</h3>

<input id="spray" placeholder="Spray Date">
<input id="whs" placeholder="WHS Name">
<input id="remarksProfile" placeholder="Remarks">

<label><input type="checkbox" id="carry"> Auto Carry</label>
<button onclick="saveProfile()">Save</button>

<hr>

<h3>Problem</h3>
<textarea id="problem"></textarea>
<button onclick="sendProblem()">Send</button>

<button onclick="contactDev()">Contact Developer</button>

</div>

<!-- ANALYZER -->
<div class="card" id="analyserBox">
<input id="lorry" placeholder="Lorry No">
<input id="moisture" placeholder="Moisture">
<input id="wdd" placeholder="WDD">
<input id="fungus" placeholder="Fungus">
<input id="fm" placeholder="FM">
</div>

<!-- SUPERVISOR -->
<div class="card" id="supervisorBox" style="display:none;">
<input id="openingBag" placeholder="Opening Bag">
<input id="openingMT" placeholder="Opening MT">

<input id="inBag" placeholder="Inward Bag">
<input id="inMT" placeholder="Inward MT">

<input id="closingBag" placeholder="Closing Bag">
<input id="closingMT" placeholder="Closing MT">

<input id="todayLorry" placeholder="Today Lorry">
<input id="pending" placeholder="Pending">
<input id="reject" placeholder="Reject">
</div>

<!-- PREVIEW -->
<div class="card">
<div class="preview" id="preview"></div>
<button onclick="saveAll()">Save</button>
<button onclick="send()">WhatsApp</button>
<button onclick="downloadPDF()">PDF</button>
<button onclick="toggleHistory()">Preview History</button>
</div>

<!-- HISTORY -->
<div id="historyBox" class="historyBox" style="display:none;"></div>

</div>

<script>

let mode=1;

// PROFILE
function toggleProfile(){
profilePanel.classList.toggle("active");
}

function saveProfile(){
let p={
spray:spray.value,
whs:whs.value,
remarks:remarksProfile.value,
carry:carry.checked
};
localStorage.setItem("profile",JSON.stringify(p));
alert("Saved");
}

function loadProfile(){
let p=JSON.parse(localStorage.getItem("profile")||"{}");
spray.value=p.spray||"13/04/26";
whs.value=p.whs||"NIRMAL KUMAR";
remarksProfile.value=p.remarks||"inward/outward";
carry.checked=p.carry||false;
}

// MODE
function setMode(m){
mode=m;
analyserBox.style.display=m==1?"block":"none";
supervisorBox.style.display=m==2?"block":"none";
generate();
}

// DATE
function getDate(){
let d=new Date();
return d.getDate()+"/"+(d.getMonth()+1)+"/"+d.getFullYear();
}

// MT FORMAT
function formatMT(v){
return (parseFloat(v||0)/1000).toFixed(3);
}

function val(id){
return document.getElementById(id)?.value||"00";
}

// GENERATE
function generate(){

let p=JSON.parse(localStorage.getItem("profile")||"{}");

let msg="";

if(mode==1){
msg=
`*Date:-* ${getDate()}
*W/h:-* Shanti Devi
*Location:-* Semapur

*Lorry no.* ${val("lorry")}

*Moisture:-* ${val("moisture")}
*WDD:-* ${val("wdd")}
*Fungus:-* ${val("fungus")}
*FM:-* ${val("fm")}
*Dunky:-* ND
*Live:-* ND

*Remarks:-* PLEASE SUGGEST SIR....`;
}
else{
msg=
`*Date:-* ${getDate()}
*Warehouse Name:-* SANTI DEVI
*Location:-* SEMAPUR
*Client Name:-* SHIV SHAKTI TRADERS
*Case Type:-* Retail/corporate 
*Chamber No.:-* GODOWN
*Commodity:-* MAIZE🌽

*Opening Bag:-* ${val("openingBag")}
*Opening MT:-* ${formatMT(val("openingMT"))}

*INward Bag:-* ${val("inBag")}
*INward MT:-* ${formatMT(val("inMT"))}                                           
*Clossing bags:-* ${val("closingBag")}
*CLOSING MT:-* ${formatMT(val("closingMT"))}

 *Pala:-* 0
 
*Lock seal No:-*      

*CHR:-* ND
*Spray:-* ${p.spray}
*Fumigation:-* ND
*Degassing:-* ND 
*MSIR:-* ND
   
*Today INward lorry:-* ${val("todayLorry")}
 *Today Pending lorry:-* ${val("pending")}
 *Today Reject lorry:-* ${val("reject")}
                                                                    *WHS Noutward_${p.whs}                                                                                       
*Remarks:-* ${p.remarks}`;
}

preview.innerText=msg;
return msg;
}

// SAVE + HISTORY
function saveAll(){
let text=generate();
let history=JSON.parse(localStorage.getItem("history")||"{}");
let date=getDate();

if(!history[date]) history[date]=[];
history[date].push(text);

localStorage.setItem("history",JSON.stringify(history));

// carry
let p=JSON.parse(localStorage.getItem("profile")||"{}");
if(p.carry){
localStorage.setItem("nextOpeningBag",val("closingBag"));
localStorage.setItem("nextOpeningMT",val("closingMT"));
}

alert("Saved");
}

// HISTORY VIEW
function toggleHistory(){
let box=document.getElementById("historyBox");
box.style.display=box.style.display=="none"?"block":"none";

let history=JSON.parse(localStorage.getItem("history")||"{}");

let html="";
for(let d in history){
html+=`<h4>${d}</h4>`;
history[d].forEach(h=>{
html+=`<pre>${h}</pre><hr>`;
});
}

box.innerHTML=html;
}

// WHATSAPP
function send(){
window.open("https://wa.me/?text="+encodeURIComponent(generate()));
}

// PDF
function downloadPDF(){
let {jsPDF}=window.jspdf;
let doc=new jsPDF("p","mm","a4");

doc.setFontSize(16);
doc.text("NBHC - NATIONAL BULK HANDLING CORPORATION",10,10);

let text=generate().replace(/\*/g,"");
let lines=doc.splitTextToSize(text,180);
doc.text(lines,10,20);

let canvas=document.createElement("canvas");
QRCode.toCanvas(canvas,text,function(){
let img=canvas.toDataURL("image/png");
doc.addImage(img,"PNG",150,220,40,40);

doc.text("Verified by System (NBHC)",10,280);
doc.save("NBHC_Report.pdf");
});
}

// PROBLEM
function sendProblem(){
let msg=document.getElementById("problem").value;
window.open("https://wa.me/917463011305?text="+encodeURIComponent(msg));
}

function contactDev(){
window.open("https://wa.me/917463011305");
}

// INIT
loadProfile();
generate();

document.querySelectorAll("input").forEach(e=>{
e.addEventListener("input",generate);
});

</script>

</body>
</html>

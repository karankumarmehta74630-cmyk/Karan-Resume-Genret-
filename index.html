<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Report Pro</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#f2f2f2;
}

/* Loader */
#loader {
  position:fixed;
  width:100%;
  height:100%;
  background:#000;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:999;
  animation: fadeOut 1s ease 2s forwards;
}

@keyframes fadeOut {
  to { opacity:0; visibility:hidden; }
}

/* Main */
.container {
  max-width:500px;
  margin:auto;
  padding:10px;
}

.card {
  background:#fff;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1; transform:translateY(0);}
}

input {
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

.preview {
  background:#e6ffe6;
  padding:10px;
  border-radius:8px;
  white-space:pre-line;
}

button {
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:8px;
  background:linear-gradient(45deg, green, #00c853);
  color:#fff;
  font-size:15px;
}

.nav {
  display:flex;
  gap:5px;
}

.nav button {
  flex:1;
  background:#333;
}

/* Hidden sections */
#historyPage {
  display:none;
}

.deleteBtn {
  background:red;
}
</style>
</head>

<body>

<!-- Loader -->
<div id="loader">
  <h2>Loading...</h2>
  <p>Made by Karan</p>
</div>

<div class="container">

<div class="nav">
  <button onclick="showHome()">Home</button>
  <button onclick="showHistory()">History</button>
</div>

<!-- HOME -->
<div id="homePage">

<div class="card">
<h3>Daily Report</h3>

<input id="lorry" placeholder="Lorry No">
<input id="moisture" placeholder="Moisture">
<input id="wdd" placeholder="WDD">
<input id="fungus" placeholder="Fungus">
<input id="fm" placeholder="FM">
<input id="remarks" placeholder="Remarks">
</div>

<div class="card">
<h4>Preview</h4>
<div class="preview" id="preview"></div>

<button onclick="saveHistory()">Save</button>
<button onclick="send()">WhatsApp</button>
<button onclick="downloadPDF()">PDF</button>
</div>

</div>

<!-- HISTORY -->
<div id="historyPage">

<div class="card">
<h3>History</h3>
<input id="search" placeholder="Search..." oninput="loadHistory()">
</div>

<div class="card" id="history"></div>

</div>

</div>

<script>

function getDate(){
  let d=new Date();
  return String(d.getDate()).padStart(2,'0')+"-"+
         String(d.getMonth()+1).padStart(2,'0')+"-"+
         d.getFullYear();
}

function getTime(){
  return new Date().toLocaleTimeString();
}

function val(id){
  return document.getElementById(id).value||"-";
}

function generate(){
let msg =
`*Date:-* ${getDate()} | ${getTime()}

*W/h:-* Shanti Devi
*Location:-* Semapur

*Lorry no.* ${val("lorry")}

*Moisture:-* ${val("moisture")}
*WDD:-* ${val("wdd")}
*Fungus:-* ${val("fungus")}
*FM:-* ${val("fm")}
*Dunky:-* ND
*Live:-* ND

*REMARKS:-*
${val("remarks")}`;

document.getElementById("preview").innerText=msg;
return msg;
}

document.querySelectorAll("input").forEach(e=>{
e.addEventListener("input",generate);
});

function send(){
let m=generate();
window.open("https://wa.me/?text="+encodeURIComponent(m));
}

function saveHistory(){
let history=JSON.parse(localStorage.getItem("reports")||"[]");
history.unshift({text:generate(),date:getDate()});
localStorage.setItem("reports",JSON.stringify(history));
}

function loadHistory(){
let search=document.getElementById("search").value.toLowerCase();
let history=JSON.parse(localStorage.getItem("reports")||"[]");

let html=history.map((h,i)=>{
if(!h.text.toLowerCase().includes(search)) return "";
return `
<div>
${h.text}
<button class="deleteBtn" onclick="del(${i})">Delete</button>
</div><hr>`;
}).join("");

document.getElementById("history").innerHTML=html;
}

function del(i){
let history=JSON.parse(localStorage.getItem("reports")||"[]");
history.splice(i,1);
localStorage.setItem("reports",JSON.stringify(history));
loadHistory();
}

function downloadPDF(){
let {jsPDF}=window.jspdf;
let doc=new jsPDF();
let text=generate().replace(/\*/g,"");
let lines=doc.splitTextToSize(text,180);
doc.text(lines,10,10);
doc.save("Report.pdf");
}

/* Navigation */
function showHome(){
document.getElementById("homePage").style.display="block";
document.getElementById("historyPage").style.display="none";
}

function showHistory(){
document.getElementById("homePage").style.display="none";
document.getElementById("historyPage").style.display="block";
loadHistory();
}

/* Init */
generate();

</script>

</body>
</html>

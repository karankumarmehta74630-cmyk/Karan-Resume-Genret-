<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>404 Page</title>

<link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/3.3.7/css/bootstrap.min.css'>
<link rel='stylesheet' href='https://fonts.googleapis.com/css?family=Arvo'>

<style>

/*======================
    404 page
=======================*/

body{
    background:#fff;
    overflow:hidden;
}

.page_404{
    padding:40px 0;
    background:#fff;
    font-family:'Arvo', serif;
    min-height:100vh;
    position:relative;
}

/* ANIMATED BACKGROUND LIGHT */

.page_404::before{
    content:'';
    position:absolute;
    width:350px;
    height:350px;
    background:rgba(57,172,49,0.08);
    border-radius:50%;
    top:-100px;
    left:-100px;
    animation:move1 6s infinite alternate;
}

.page_404::after{
    content:'';
    position:absolute;
    width:300px;
    height:300px;
    background:rgba(0,123,255,0.08);
    border-radius:50%;
    bottom:-100px;
    right:-100px;
    animation:move2 6s infinite alternate;
}

@keyframes move1{
    100%{
        transform:translate(60px,40px);
    }
}

@keyframes move2{
    100%{
        transform:translate(-60px,-40px);
    }
}

/* GIF AREA */

.four_zero_four_bg{

    background-image:url(https://cdn.dribbble.com/users/285475/screenshots/2083086/dribbble_1.gif);
    height:400px;
    background-position:center;
    background-repeat:no-repeat;
    position:relative;
    animation:float 4s infinite ease-in-out;
}

@keyframes float{
    50%{
        transform:translateY(-10px);
    }
}

/* 404 TEXT */

.four_zero_four_bg h1{
    font-size:90px;
    font-weight:bold;
    color:#000;
    animation:zoom 2s infinite alternate;
}

@keyframes zoom{
    100%{
        transform:scale(1.05);
    }
}

.four_zero_four_bg h3{
    font-size:80px;
}

/* CONTENT BOX */

.contant_box_404{
    margin-top:-50px;
    position:relative;
    z-index:10;
}

.contant_box_404 h3{
    font-size:38px;
    font-weight:bold;
    color:#111;
}

.contant_box_404 p{
    color:#555;
    font-size:18px;
    margin-top:10px;
}

/* SUPPORT BOX */

.support-box{
    margin-top:20px;
    display:inline-block;
    background:#f5f5f5;
    padding:14px 25px;
    border-radius:15px;
    border:1px solid #ddd;
    font-size:16px;
    color:#111;
    font-weight:600;
    box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

/* BUTTON */

.link_404{

    color:#fff!important;
    padding:14px 35px;
    background:#39ac31;
    margin-top:25px;
    display:inline-block;
    border-radius:50px;
    text-decoration:none;
    font-size:17px;
    transition:0.3s;
    box-shadow:0 10px 20px rgba(57,172,49,0.3);
}

.link_404:hover{
    background:#2f8f28;
    transform:translateY(-5px);
    text-decoration:none;
}

/* STATUS */

.status{
    margin-top:15px;
    color:#ff3b30;
    font-weight:bold;
    animation:blink 1.5s infinite;
}

@keyframes blink{
    50%{
        opacity:0.5;
    }
}

/* MOBILE */

@media(max-width:768px){

.four_zero_four_bg h1{
    font-size:65px;
}

.contant_box_404 h3{
    font-size:28px;
}

.contant_box_404 p{
    font-size:15px;
}

.support-box{
    width:100%;
    font-size:14px;
}

.link_404{
    width:100%;
}

}

</style>

</head>

<body>

<section class="page_404">

    <div class="container">

        <div class="row">

            <div class="col-sm-12">

                <div class="col-sm-10 col-sm-offset-1 text-center">

                    <div class="four_zero_four_bg">

                        <h1 class="text-center">404</h1>

                    </div>

                    <div class="contant_box_404">

                        <h3 class="h2">
                            Looks Like You're Lost
                        </h3>

                        <p>
                            The page you are looking for is not available or temporarily removed.
                        </p>

                        <div class="status">
                            Developer Is Busy Right Now
                        </div>

                        <div class="support-box">
                            📧 Contact Support :
                            karankumarmehta74630@gmail.com
                        </div>

                        <br>

                        <a href="#" class="link_404">
                            Go To Home
                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</section>

</body>
</html>

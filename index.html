<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Image ⇄ PDF Tool</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}

body{
    background: linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
}

/* HEADER */
.header{
    padding:20px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
    background:#020617;
}

/* TABS */
.tabs{
    display:flex;
    justify-content:center;
    margin-top:10px;
}
.tabs button{
    padding:10px 20px;
    border:none;
    background:#1e293b;
    color:white;
    cursor:pointer;
    margin:5px;
    border-radius:8px;
    transition:0.3s;
}
.tabs button.active{
    background:#22c55e;
}

/* CONTAINER */
.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

/* CARD */
.card{
    background:#1e293b;
    padding:20px;
    border-radius:15px;
    margin-top:20px;
    animation:fadeIn 0.5s ease;
}

@keyframes fadeIn{
    from{opacity:0;transform:translateY(20px)}
    to{opacity:1;transform:translateY(0)}
}

/* INPUT */
input,select{
    padding:10px;
    margin:10px;
    border-radius:8px;
    border:none;
}

/* BUTTON */
.btn{
    background:#22c55e;
    padding:12px 20px;
    border:none;
    border-radius:8px;
    color:white;
    cursor:pointer;
    transition:0.3s;
}
.btn:hover{
    transform:scale(1.05);
}

/* PREVIEW */
.preview{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
}
.preview img{
    width:90px;
    border-radius:8px;
    transition:0.3s;
}
.preview img:hover{
    transform:scale(1.1);
}

/* DROP AREA */
.drop{
    border:2px dashed #22c55e;
    padding:20px;
    border-radius:10px;
    margin-top:10px;
}

/* PDF IMAGE */
.pdfImg{
    width:120px;
    margin:10px;
}

/* LOADER */
.loader{
    display:none;
    margin-top:10px;
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

</head>

<body>

<div class="header">⚡ PRO Image ⇄ PDF Tool</div>

<div class="tabs">
<button onclick="showTab('jpg')" class="active">JPG → PDF</button>
<button onclick="showTab('pdf')">PDF → JPG</button>
</div>

<div class="container">

<!-- JPG TO PDF -->
<div id="jpgTab" class="card">

<h3>Upload Images</h3>

<div class="drop" id="dropArea">
Drag & Drop Images OR Select
<input type="file" id="images" multiple accept="image/*">
</div>

<select id="paper">
<option value="a4">A4</option>
<option value="letter">Letter</option>
</select>

<input type="number" id="quality" value="80" placeholder="Quality %">

<div class="preview" id="preview"></div>

<button class="btn" onclick="makePDF()">Generate PDF</button>

<div class="loader" id="loader">Processing...</div>

</div>

<!-- PDF TO JPG -->
<div id="pdfTab" class="card" style="display:none">

<h3>Upload PDF</h3>

<input type="file" id="pdfFile" accept="application/pdf">

<button class="btn" onclick="pdfToImg()">Convert</button>

<div id="pdfOutput"></div>

</div>

</div>

<script>

let files = [];

/* TAB SWITCH */
function showTab(tab){
    document.getElementById("jpgTab").style.display = tab==='jpg'?'block':'none';
    document.getElementById("pdfTab").style.display = tab==='pdf'?'block':'none';

    document.querySelectorAll(".tabs button").forEach(btn=>btn.classList.remove("active"));
    event.target.classList.add("active");
}

/* PREVIEW */
document.getElementById("images").addEventListener("change", e=>{
    files = Array.from(e.target.files);
    showPreview();
});

/* DRAG DROP */
let drop = document.getElementById("dropArea");

drop.addEventListener("dragover", e=>{
    e.preventDefault();
    drop.style.background="#334155";
});

drop.addEventListener("dragleave", ()=>{
    drop.style.background="transparent";
});

drop.addEventListener("drop", e=>{
    e.preventDefault();
    files = Array.from(e.dataTransfer.files);
    showPreview();
});

/* SHOW PREVIEW */
function showPreview(){
    let preview = document.getElementById("preview");
    preview.innerHTML="";

    files.forEach((file,i)=>{
        let img=document.createElement("img");
        img.src=URL.createObjectURL(file);
        preview.appendChild(img);
    });
}

/* JPG TO PDF */
async function makePDF(){
    document.getElementById("loader").style.display="block";

    const { jsPDF } = window.jspdf;
    let pdf = new jsPDF();

    for(let i=0;i<files.length;i++){
        let img = await toData(files[i]);

        if(i!==0) pdf.addPage();

        pdf.addImage(img,'JPEG',10,10,180,250);
    }

    pdf.save("file.pdf");

    document.getElementById("loader").style.display="none";
}

/* FILE TO BASE64 */
function toData(file){
    return new Promise(res=>{
        let r=new FileReader();
        r.onload=e=>res(e.target.result);
        r.readAsDataURL(file);
    });
}

/* PDF TO IMAGE */
async function pdfToImg(){
    let file=document.getElementById("pdfFile").files[0];
    let output=document.getElementById("pdfOutput");
    output.innerHTML="";

    let reader=new FileReader();

    reader.onload=async function(){
        let pdf=await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;

        for(let i=1;i<=pdf.numPages;i++){
            let page=await pdf.getPage(i);

            let canvas=document.createElement("canvas");
            let ctx=canvas.getContext("2d");

            let view=page.getViewport({scale:2});
            canvas.width=view.width;
            canvas.height=view.height;

            await page.render({canvasContext:ctx,viewport:view}).promise;

            let img=document.createElement("img");
            img.src=canvas.toDataURL("image/jpeg");
            img.className="pdfImg";

            let link=document.createElement("a");
            link.href=img.src;
            link.download="page_"+i+".jpg";
            link.innerText="Download Page "+i;

            output.appendChild(img);
            output.appendChild(document.createElement("br"));
            output.appendChild(link);
            output.appendChild(document.createElement("hr"));
        }
    }

    reader.readAsArrayBuffer(file);
}

</script>

</body>
</html>

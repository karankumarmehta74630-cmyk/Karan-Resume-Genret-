<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NBHC History Dashboard</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.1/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#e3f2fd,#ffffff);
}

.card{
margin:10px;
padding:12px;
background:#fff;
border-radius:15px;
box-shadow:0 6px 15px rgba(0,0,0,0.1);
animation:fadeIn 0.5s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(15px);}
to{opacity:1;transform:translateY(0);}
}

input,select,textarea{
width:100%;
padding:10px;
margin:6px 0;
border-radius:10px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
margin-top:5px;
border:none;
border-radius:10px;
background:linear-gradient(45deg,#4caf50,#00c853);
color:#fff;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

.item{
border-bottom:1px solid #ddd;
padding:6px 0;
}

.editBox{
display:none;
}

</style>
</head>

<body>

<!-- TOTAL HISTORY -->
<div class="card">
<h3>📊 Total History</h3>
<input id="search" placeholder="Search..." oninput="loadHistory()">
<div id="history"></div>
</div>

<!-- MONTHLY REPORT -->
<div class="card">
<h3>📆 Monthly Report</h3>
<input type="month" id="monthPicker" onchange="loadMonthly()">
<div id="monthlyView"></div>
<button onclick="downloadMonthlyPDF()">Download PDF</button>
</div>

<!-- GRAPH -->
<div class="card">
<h3>📈 Stock Graph</h3>
<canvas id="chart"></canvas>
</div>

<script>

// LOAD HISTORY
function loadHistory(){

let search=document.getElementById("search").value.toLowerCase();
let history=JSON.parse(localStorage.getItem("history")||"[]");

let html=history.map((h,i)=>{
if(!h.toLowerCase().includes(search)) return "";

return `
<div class="item">

<div id="text${i}">${h}</div>

<textarea id="edit${i}" class="editBox">${h}</textarea>

<button onclick="edit(${i})">Edit</button>
<button onclick="saveEdit(${i})">Save</button>
<button onclick="share(${i})">Share</button>
<button style="background:red" onclick="del(${i})">Delete</button>

</div>
`;
}).join("");

document.getElementById("history").innerHTML=html || "No Data";
}

// EDIT
function edit(i){
document.getElementById("edit"+i).style.display="block";
}

// SAVE EDIT
function saveEdit(i){

let history=JSON.parse(localStorage.getItem("history")||"[]");

history[i]=document.getElementById("edit"+i).value;

localStorage.setItem("history",JSON.stringify(history));

loadHistory();
}

// SHARE
function share(i){
let history=JSON.parse(localStorage.getItem("history")||"[]");
let msg=history[i];
window.open("https://wa.me/?text="+encodeURIComponent(msg));
}

// DELETE
function del(i){
let history=JSON.parse(localStorage.getItem("history")||"[]");
history.splice(i,1);
localStorage.setItem("history",JSON.stringify(history));
loadHistory();
}

// MONTHLY
function loadMonthly(){

let month=document.getElementById("monthPicker").value;
let reports=JSON.parse(localStorage.getItem("reportsData")||{});

let labels=[];
let opening=[];
let closing=[];
let html="";

Object.keys(reports).forEach(date=>{

let [d,m,y]=date.split("/");
let formatted=y+"-"+m.padStart(2,"0");

if(formatted!==month) return;

let r=reports[date];

labels.push(date);
opening.push(Number(r.openingBag));
closing.push(Number(r.closingBag));

html+=`
<div class="item">
<b>${date}</b><br>
Opening: ${r.openingBag}<br>
Closing: ${r.closingBag}
</div>
`;
});

document.getElementById("monthlyView").innerHTML=html || "No Data";

drawChart(labels,opening,closing);
}

// GRAPH
function drawChart(labels,open,close){

let ctx=document.getElementById("chart");

new Chart(ctx,{
type:'line',
data:{
labels:labels,
datasets:[
{label:'Opening',data:open},
{label:'Closing',data:close}
]
}
});
}

// PDF
function downloadMonthlyPDF(){

let {jsPDF}=window.jspdf;
let doc=new jsPDF("p","mm","a4");

let reports=JSON.parse(localStorage.getItem("reportsData")||{});
let month=document.getElementById("monthPicker").value;

let yPos=20;

doc.text("NBHC - National Bulk Handling Corporation",10,10);

Object.keys(reports).forEach(date=>{

let [d,m,y]=date.split("/");
let formatted=y+"-"+m.padStart(2,"0");

if(formatted!==month) return;

let r=reports[date];

let text=
`${date}
Opening: ${r.openingBag}
Closing: ${r.closingBag}`;

if(yPos>250){
doc.addPage();
yPos=20;
}

doc.text(text,10,yPos);
yPos+=10;

});

// QR
let canvas=document.createElement("canvas");

QRCode.toCanvas(canvas,"NBHC VERIFIED",function(){

let img=canvas.toDataURL("image/png");

doc.addImage(img,"PNG",150,240,40,40);

doc.text("Verified by NBHC",10,280);

doc.save("NBHC_Report.pdf");

});

}

// INIT
loadHistory();

</script>

</body>
</html>
